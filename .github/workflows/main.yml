name: Java CI/CD & Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # 1. On crée la base de données temporaire pour les tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mes_salons
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      # 2. On lance les tests en forçant Spring Boot à utiliser la base temporaire
      - name: Maven Build & Test
        run: mvn -B -U clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mes_salons
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password

      # 3. On se connecte à GitHub Packages (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. On build et on push l'image Docker (avec le tag demandé par le prof)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/univ-smb-m1-isc-2026/messalonsdecoiffure-api:latest